name: Stock News Bot

on:
  schedule:
    # Runs at :03 and :33 rather than exactly :00/:30 — those exact marks
    # are the most heavily used cron times across all of GitHub, so
    # offsetting by a few minutes avoids queueing delays during busy
    # periods (this is GitHub's own documented recommendation).
    - cron: "3,33 * * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed to commit the updated seen_articles.json back

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_news_bot.py

      - name: Commit updated seen-articles cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json
          git diff --staged --quiet || git commit -m "Update seen articles cache [skip ci]"
          git push